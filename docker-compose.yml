# AI Backend API — Local Development Stack
#
# Services:
#   redis     — Rate limiting + chat history cache
#   qdrant    — Vector database for embeddings
#   api       — FastAPI application
#   worker    — Background document processing worker
#
# Usage:
#   docker compose up -d          # Start (applies docker-compose.override.yml for dev)
#   docker compose down           # Stop and remove containers
#   docker compose logs -f api    # Tail API logs

services:
  # ── Redis ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Qdrant ───────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.14.0
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC API
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__LOG_LEVEL=INFO
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/readyz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── API ──────────────────────────────────────────────────────
  api:
    build:
      context: .
      target: runtime
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    # Override settings to use Docker internal service names (not localhost)
    environment:
      - REDIS__HOST=redis
      - REDIS__PORT=6379
      - QDRANT__HOST=qdrant
      - QDRANT__PORT=6333
      - QDRANT__PREFER_GRPC=false
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Worker ───────────────────────────────────────────────────
  worker:
    build:
      context: .
      target: runtime
    # Run the worker module instead of the API server
    command: ["python", "-m", "app.infrastructure.queue.worker"]
    restart: on-failure
    env_file: .env
    environment:
      - REDIS__HOST=redis
      - REDIS__PORT=6379
      - QDRANT__HOST=qdrant
      - QDRANT__PORT=6333
      - QDRANT__PREFER_GRPC=false
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy

# ── Named Volumes ────────────────────────────────────────────
volumes:
  redis_data:
  qdrant_data:
