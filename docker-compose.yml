version: "3.9"

services:
  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ai-backend-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - ai-backend

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ai-backend-postgres
    environment:
      POSTGRES_USER: ${DATABASE__USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE__PASSWORD:-postgres}
      POSTGRES_DB: ${DATABASE__DB_NAME:-ai_backend}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/migrate.sql:/docker-entrypoint-initdb.d/migrate.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE__USER:-postgres} -d ${DATABASE__DB_NAME:-ai_backend}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - ai-backend

  # ── Qdrant ─────────────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.13.0
    container_name: ai-backend-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - ai-backend

  # ── API ────────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: ai-backend-api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      DEBUG: "true"
      LOG_LEVEL: "INFO"
      API_KEY: ${API_KEY:-change-me-in-production}
      OPENAI__API_KEY: ${OPENAI__API_KEY}
      OPENAI__MODEL: ${OPENAI__MODEL:-gpt-4o}
      OPENAI__EMBEDDING_MODEL: ${OPENAI__EMBEDDING_MODEL:-text-embedding-3-small}
      REDIS__HOST: redis
      REDIS__PORT: "6379"
      DATABASE__HOST: postgres
      DATABASE__PORT: "5432"
      DATABASE__USER: ${DATABASE__USER:-postgres}
      DATABASE__PASSWORD: ${DATABASE__PASSWORD:-postgres}
      DATABASE__DB_NAME: ${DATABASE__DB_NAME:-ai_backend}
      QDRANT__HOST: qdrant
      QDRANT__PORT: "6333"
      QDRANT__GRPC_PORT: "6334"
      CHUNKING__CHUNK_SIZE: ${CHUNKING__CHUNK_SIZE:-512}
      CHUNKING__CHUNK_OVERLAP: ${CHUNKING__CHUNK_OVERLAP:-50}
      RAG__SCORE_THRESHOLD: ${RAG__SCORE_THRESHOLD:-0.72}
      RAG__MAX_CONTEXT_TOKENS: ${RAG__MAX_CONTEXT_TOKENS:-20000}
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ai-backend

  # ── ARQ Worker ─────────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: ai-backend-worker
    # CRIT-1 + IMP-11 Fix: Real ARQ entrypoint — workers share the Redis queue with the API
    command: arq app.infrastructure.queue.arq_worker.ArqWorkerSettings
    environment:
      DEBUG: "true"
      LOG_LEVEL: "INFO"
      API_KEY: ${API_KEY:-change-me-in-production}
      OPENAI__API_KEY: ${OPENAI__API_KEY}
      OPENAI__MODEL: ${OPENAI__MODEL:-gpt-4o}
      OPENAI__EMBEDDING_MODEL: ${OPENAI__EMBEDDING_MODEL:-text-embedding-3-small}
      REDIS__HOST: redis
      REDIS__PORT: "6379"
      DATABASE__HOST: postgres
      DATABASE__PORT: "5432"
      DATABASE__USER: ${DATABASE__USER:-postgres}
      DATABASE__PASSWORD: ${DATABASE__PASSWORD:-postgres}
      DATABASE__DB_NAME: ${DATABASE__DB_NAME:-ai_backend}
      QDRANT__HOST: qdrant
      QDRANT__PORT: "6333"
      QDRANT__GRPC_PORT: "6334"
      CHUNKING__CHUNK_SIZE: ${CHUNKING__CHUNK_SIZE:-512}
      CHUNKING__CHUNK_OVERLAP: ${CHUNKING__CHUNK_OVERLAP:-50}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ai-backend

volumes:
  redis_data:
  postgres_data:
  qdrant_data:

networks:
  ai-backend:
    driver: bridge
